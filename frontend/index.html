<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINÉ LUXE | Premium Cinema Booking</title>
    <style>
        @import url('https://googleapis.com');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        :root {
            --gold: #dfb76c;
            --gold-dark: #b89149;
            --bg-black: #060608;
            --card-bg: #111116;
            --text-light: #f5f5f5;
            --text-muted: #8c8c96;
            --glass-border: rgba(223, 183, 108, 0.15);
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        body { background-color: var(--bg-black); color: var(--text-light); overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Nav Architecture */
        header {
            position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 3rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background: linear-gradient(to bottom, rgba(6,6,8,0.95), transparent);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; color: var(--gold); text-decoration: none; }
        
        /* Immersive Hero Canvas */
        .hero {
            height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
            position: relative; background: radial-gradient(circle at center, #1a1a26 0%, var(--bg-black) 70%); padding: 0 2rem;
        }
        .hero-content h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 5.5rem); font-weight: 900; letter-spacing: 2px; margin-bottom: 1.5rem; background: linear-gradient(180deg, #fff 40%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-content p { color: var(--text-muted); font-size: 1.1rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 3rem; }
        .cta-btn { background: transparent; border: 1px solid var(--gold); color: var(--text-main); padding: 1rem 2.5rem; font-size: 0.85rem; font-weight: 700; letter-spacing: 2px; border-radius: 4px; cursor: pointer; transition: var(--transition-smooth); box-shadow: 0 0 15px rgba(223, 183, 108, 0.1); }
        .cta-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px rgba(223, 183, 108, 0.4); }

        /* Page Routing views */
        .page-view { display: none; max-width: 1400px; margin: 4rem auto; padding: 0 2rem; }
        .page-view.active { display: block; }

        /* Movie Selection Grid */
        .language-tabs { display: flex; gap: 1rem; margin-bottom: 3rem; border-bottom: 1px solid #1a1a24; padding-bottom: 1rem; }
        .lang-btn { background: transparent; border: 1px solid #333; color: var(--text-muted); padding: 0.6rem 2rem; font-size: 0.85rem; font-weight: 600; border-radius: 30px; cursor: pointer; transition: var(--transition-smooth); }
        .lang-btn.active, .lang-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(223, 183, 108, 0.05); }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem; }
        .movie-card { background: var(--card-bg); border: 1px solid #1c1c24; border-radius: 16px; overflow: hidden; transition: var(--transition-smooth); position: relative; }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 15px 35px rgba(223, 183, 108, 0.1); }
        .movie-poster { height: 380px; background: linear-gradient(135deg, #1e1e2a, #0b0b0f); display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; }
        .movie-badge { position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); padding: 0.3rem 0.8rem; font-size: 0.7rem; font-weight: 700; border-radius: 4px; }
        .movie-details { padding: 2rem; }
        .movie-title { font-family: 'Cinzel', serif; font-size: 1.4rem; margin-bottom: 0.5rem; }
        .movie-meta { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem; display: flex; justify-content: space-between; }

        /* Interactive Seating Layout */
        .booking-layout { display: grid; grid-template-columns: 1fr; gap: 4rem; }
        @media(min-width: 950px) { .booking-layout { grid-template-columns: 2fr 1fr; } }
        .cinema-screen { width: 80%; height: 6px; background: #fff; box-shadow: 0 4px 25px rgba(255,255,255,0.8); border-radius: 50%; margin: 0 auto 3rem auto; }
        .seating-chart { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0.8rem; max-width: 480px; margin: 0 auto; }
        .seat { aspect-ratio: 1; background: #22222a; border: 1px solid #333344; border-radius: 6px; cursor: pointer; transition: var(--transition-smooth); }
        .seat.selected { background: var(--gold); border-color: var(--gold); }
        .seat.occupied { background: #0f0f14; border-color: #15151c; cursor: not-allowed; opacity: 0.3; }

        /* Glassmorphic Order Summary & Payments */
        .summary-panel { background: var(--card-bg); border: 1px solid var(--glass-border); padding: 2.5rem; border-radius: 16px; align-self: start; }
        .summary-panel h2 { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 1.5rem; border-bottom: 1px solid #222; padding-bottom: 0.5rem; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.95rem; }
        .summary-total { border-top: 1px dashed #333; padding-top: 1rem; margin-top: 1.5rem; font-weight: 700; font-size: 1.25rem; color: var(--gold); }
        
        /* Payment Section Form */
        .payment-form { margin-top: 2rem; border-top: 1px solid #222; padding-top: 1.5rem; }
        .input-box { width: 100%; background: #09090d; border: 1px solid #222230; padding: 0.9rem; border-radius: 6px; color: #fff; margin-bottom: 1rem; outline: none; transition: var(--transition-smooth); }
        .input-box:focus { border-color: var(--gold); }
        .checkout-btn { width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; border: none; padding: 1.1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: var(--transition-smooth); }
        .checkout-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(223, 183, 108, 0.2); }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="routeTo('catalog')">CINÉ LUXE</a>
        <div style="font-size:0.8rem; letter-spacing:3px; color:var(--gold); font-weight:700;">PREMIUM ATELIER</div>
    </header>

    <section class="hero" id="hero-banner">
        <div class="hero-content">
            <h1>EXPERIENCE CINEMA ELITE</h1>
            <p>Immersive Luxury Screenings & Lounge Access</p>
            <button class="cta-btn" onclick="scrollToCatalog()">EXPLORE REPERTOIRE</button>
        </div>
    </section>

    <!-- Page 1: Movie Repertoire -->
    <main id="catalog-page" class="page-view">
        <div class="language-tabs">
            <button class="lang-btn active" onclick="filterLanguage('ALL')">ALL LANGUAGES</button>
            <button class="lang-btn" onclick="filterLanguage('ENGLISH')">ENGLISH</button>
            <button class="lang-btn" onclick="filterLanguage('HINDI')">HINDI</button>
            <button class="lang-btn" onclick="filterLanguage('TELUGU')">TELUGU</button>
        </div>
        <div class="movie-grid" id="movie-grid-container"></div>
    </main>

    <!-- Page 2: Seating & Unified Secure Payment Checkout -->
    <main id="booking-page" class="page-view">
        <button class="lang-btn" style="margin-bottom:2rem;" onclick="routeTo('catalog')">← Back to Selection</button>
        <div class="booking-layout">
            <div>
                <div class="cinema-screen"></div>
                <div class="seating-chart" id="seating-chart-container"></div>
            </div>
            
            <aside class="summary-panel">
                <h2>Reservation Summary</h2>
                <div class="summary-row">
                    <span style="color:var(--text-muted)">Selected Film</span>
                    <span id="summary-title" style="font-weight:600;">-</span>
                </div>
                <div class="summary-row">
                    <span style="color:var(--text-muted)">Language / Tier</span>
                    <span id="summary-lang">-</span>
                </div>
                <div class="summary-row">
                    <span style="color:var(--text-muted)">Allocated Seats</span>
                    <span id="summary-seats" style="color:var(--gold); font-weight:600;">None</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total Valuation</span>
                    <span id="summary-total-price">₹0</span>
                </div>

                <!-- Live Payment Gateway Simulation Box -->
                <form class="payment-form" onsubmit="processPremiumPayment(event)">
                    <div style="font-size:0.7rem; font-weight:700; letter-spacing:2px; color:var(--text-muted); margin-bottom:0.5rem; text-transform:uppercase;">Secure Gateway Payment</div>
                    <input type="text" class="input-box" placeholder="Cardholder Name" required>
                    <input type="text" class="input-box" placeholder="4111 •••• •••• ••••" maxlength="16" required>
                    <div style="display:flex; gap:1rem;">
