apiVersion: v1
kind: ResourceQuota
metadata:
  name: cluster-resource-quota
  namespace: default
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
---
apiVersion: v1
kind: Secret
metadata:
  name: database-secret-vault
  namespace: default
type: Opaque
data:
  # Base64 encoded token value matching plain text string "vprodbpass"
  mysql-root-password: dXByb2RicGFzcw==
  mysql-user-password: dXByb2RicGFzcw==
