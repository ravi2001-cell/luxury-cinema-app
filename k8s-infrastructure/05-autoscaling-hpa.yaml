apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: movie-frontend-hpa
  namespace: default
spec:
  # 1. Target the exact Deployment you want to autoscale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: luxury-ui-deploy # Must match the exact name in your frontend deployment file

  # 2. Set the capacity guard rails
  minReplicas: 2   # Minimum number of pods to keep alive when nobody is booking
  maxReplicas: 10  # Maximum cap on pods to prevent blowing your AWS budget

  # 3. Define your 70% CPU scaling metric trigger
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # Scales up if average CPU usage across pods goes past 70%

  # 4. Advanced behavior policies for smart scaling curves
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0 # React instantly the second a flash sale starts
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15 # Allows the cluster to double the pod count every 15 seconds
    scaleDown:
      stabilizationWindowSeconds: 300 # Wait a full 5 minutes after traffic drops before killing pods
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60 # Gradually terminate maximum 10% of pods per minute
