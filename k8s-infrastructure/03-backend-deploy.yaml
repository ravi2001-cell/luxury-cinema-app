apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-application-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      tier: app-logic
  template:
    metadata:
      labels:
        tier: app-logic
    spec:
      containers:
        - name: java-api-engine
          image: rkdocker1800/auto1:app
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-secret-vault
                  key: mysql-user-password
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1024Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service-cluster
  namespace: default
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    tier: app-logic
